version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nurax_db
    env_file: config/postgres.env
    environment:
      POSTGRES_DB: ${DB_NAME:-nurax_db}
      POSTGRES_USER: ${DB_USER:-nurax_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nurax_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: nurax_api
    command: bash -c "python manage.py migrate && python init_db.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ${PWD}:/app
    ports:
      - "8000:8000"
    env_file:
      - config/postgres.env  # DB connection variables
      - .env                 # App variables (Cloudinary, Pusher, Admin, etc.)
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:

