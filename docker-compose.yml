version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nurax_db
    env_file: postgres.env
    environment:
      POSTGRES_DB: ${DB_NAME:-nurax_db}
      POSTGRES_USER: ${DB_USER:-nurax_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nurax_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: nurax_api
    command: bash -c "python manage.py migrate && python init_db.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ${PWD}:/app
    ports:
      - "8000:8000"
    env_file: postgres.env
    environment:
      - DB_HOST=db
      - DEBUG=True
      - SECRET_KEY=dev-key-change-in-prod-insecure
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - PUSHER_KEY=${PUSHER_KEY}
      - PUSHER_SECRET=${PUSHER_SECRET}
      - PUSHER_CLUSTER=${PUSHER_CLUSTER}
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
